<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5EA8FF"/>
      <stop offset="50%" stop-color="#8B7CF6"/>
      <stop offset="100%" stop-color="#3ED598"/>
    </linearGradient>
    <linearGradient id="irisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CC4FF"/>
      <stop offset="100%" stop-color="#3ED598"/>
    </linearGradient>
    <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0B0F1A"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#070B14"/>

  <!-- Hexagon outline -->
  <polygon
    points="32,4 56,17 56,43 32,60 8,43 8,17"
    fill="none"
    stroke="url(#hexGradient)"
    stroke-width="3"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <!-- Inner hexagon accent (thin) -->
  <polygon
    points="32,10 50,20 50,40 32,52 14,40 14,20"
    fill="none"
    stroke="url(#hexGradient)"
    stroke-width="0.75"
    opacity="0.35"
  />

  <!-- Eye shape -->
  <path
    d="M13 32 C20 22, 44 22, 51 32 C44 42, 20 42, 13 32 Z"
    fill="#0B0F1A"
    stroke="url(#hexGradient)"
    stroke-width="1.5"
  />

  <!-- Iris -->
  <circle cx="32" cy="32" r="8.5" fill="url(#irisGradient)"/>

  <!-- Pupil -->
  <circle cx="32" cy="32" r="4" fill="url(#pupilGlow)"/>

  <!-- Eye highlight -->
  <circle cx="29.5" cy="29.5" r="1.6" fill="#FFFFFF" opacity="0.85"/>
</svg>
